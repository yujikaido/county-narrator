services:
  county-narrator:
    build: .
    image: county-narrator:latest
    container_name: county-narrator
    restart: unless-stopped
    ports:
      # Host port 8001 by default (8000 commonly taken, e.g. by county-scribe).
      # Override with APP_PORT=xxxx in the shell or a .env file next to this.
      - "${APP_PORT:-8001}:8000"
    environment:
      - TZ=America/Chicago
    volumes:
      # Voices + generated audio (back this up)
      - ./data:/app/data
      # Model weights cache — survives rebuilds so updates don't re-download ~2 GB
      - ./data/hf-cache:/root/.cache/huggingface
